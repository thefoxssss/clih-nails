<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crash Diagram Maker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Crash Diagram Maker</h1>
        <p>Create vehicle collision diagrams similar to incident reports.</p>
      </div>
      <div class="actions">
        <button id="undoBtn">Undo</button>
        <button id="clearBtn">Clear</button>
        <button id="exportBtn" class="primary">Export PNG</button>
      </div>
    </header>

    <aside class="panel">
      <h2>Tools</h2>
      <div class="tool-grid" id="toolGrid">
        <button class="tool active" data-tool="select">Select</button>
        <button class="tool" data-tool="car">Car</button>
        <button class="tool" data-tool="truck">Truck</button>
        <button class="tool" data-tool="motorcycle">Motorcycle</button>
        <button class="tool" data-tool="arrow">Direction Arrow</button>
        <button class="tool" data-tool="skid">Skid Mark</button>
        <button class="tool" data-tool="text">Text Label</button>
      </div>

      <h2>Road setup</h2>
      <label>Road type</label>
      <select id="roadType">
        <option value="intersection">4-way intersection</option>
        <option value="straight">Straight road</option>
        <option value="t-junction">T-junction</option>
      </select>

      <label>Weather</label>
      <select id="weather">
        <option>Clear</option>
        <option>Rain</option>
        <option>Snow</option>
        <option>Fog</option>
      </select>

      <label>Light</label>
      <select id="light">
        <option>Daylight</option>
        <option>Dusk</option>
        <option>Night</option>
      </select>

      <p class="hint">Tip: click an object in Select mode to drag or rotate with mouse wheel.</p>
    </aside>

    <main class="canvas-wrap">
      <canvas id="diagramCanvas" width="1100" height="720"></canvas>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
