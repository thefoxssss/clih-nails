<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Crash Report Diagram</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="hud">
      <div id="speedDisplay">Speed: 0 mph</div>
      <div class="health-row">
        <span>Player</span>
        <div class="health-bar-bg"><div id="playerHealth" class="health-bar-fill"></div></div>
      </div>
      <div class="health-row" id="targetHealthRow">
        <span>Target</span>
        <div class="health-bar-bg"><div id="targetHealth" class="health-bar-fill"></div></div>
      </div>
    </div>
    <div id="storyModal" class="modal">
      <h1 id="storyTitle"></h1>
      <p id="storyText"></p>
      <button id="startLevelBtn" class="primary">Start Mission</button>
    </div>

    <div id="gameOverModal" class="modal hidden">
      <h1>Wasted</h1>
      <p>Your vehicle is totaled.</p>
      <button id="restartGameBtn" class="primary">Restart Game</button>
    </div>

    <div id="levelCompleteModal" class="modal hidden">
      <h1>Target Neutralized</h1>
      <p>Good work, officer.</p>
      <button id="nextLevelBtn" class="primary">Continue</button>
    </div>

    <div id="gameWonModal" class="modal hidden">
      <h1>All Targets Neutralized</h1>
      <p>You have successfully completed all missions and cleaned up the streets. Excellent work, Officer!</p>
      <button id="playAgainBtn" class="primary">Play Again</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
