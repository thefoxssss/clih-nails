<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Crash Report Diagram</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Police Crash Report Diagram</h1>
        <p>Build report-style scene diagrams with labeled units, controls, and evidence marks.</p>
      </div>
      <div class="actions">
        <button id="undoBtn">Undo</button>
        <button id="clearBtn">Clear</button>
        <button id="exportBtn" class="primary">Export PNG</button>
      </div>
    </header>

    <aside class="panel">
      <h2>Report Header</h2>
      <div class="report-grid">
        <label for="reportNumber">Report #</label>
        <input id="reportNumber" type="text" value="2026-001284">
        <label for="reportDate">Date</label>
        <input id="reportDate" type="date">
        <label for="reportLocation">Location</label>
        <input id="reportLocation" type="text" value="Main St / 8th Ave">
        <label for="officerName">Officer</label>
        <input id="officerName" type="text" value="Ofc. J. Miller #417">
      </div>

      <h2>Tools</h2>
      <div class="tool-grid" id="toolGrid">
        <button class="tool active" data-tool="select">Select / Move</button>
        <button class="tool" data-tool="car">Patrol Car</button>
        <button class="tool" data-tool="truck">Truck</button>
        <button class="tool" data-tool="motorcycle">Motorcycle</button>
        <button class="tool" data-tool="arrow">Direction Arrow</button>
        <button class="tool" data-tool="skid">Skid Mark</button>
        <button class="tool" data-tool="text">Text Label</button>
        <button class="tool" data-tool="cone">Evidence Cone</button>
      </div>

      <h2>Selected Unit</h2>
      <div class="control-row">
        <button id="rotateLeftBtn">Rotate ⟲</button>
        <button id="rotateRightBtn">Rotate ⟳</button>
      </div>
      <div class="control-row">
        <button id="bringFrontBtn">Bring Front</button>
        <button id="sendBackBtn">Send Back</button>
      </div>

      <h2>Road setup</h2>
      <label for="roadType">Road type</label>
      <select id="roadType">
        <option value="intersection">4-way intersection</option>
        <option value="straight">Straight road</option>
        <option value="t-junction">T-junction</option>
      </select>

      <label for="weather">Weather</label>
      <select id="weather">
        <option>Clear</option>
        <option>Rain</option>
        <option>Snow</option>
        <option>Fog</option>
      </select>

      <label for="light">Light</label>
      <select id="light">
        <option>Daylight</option>
        <option>Dusk</option>
        <option>Night</option>
      </select>

      <p class="hint">Tip: In Select mode, click an object to move it. Use mouse wheel or rotate buttons to align vehicles.</p>
    </aside>

    <main class="canvas-wrap">
      <canvas id="diagramCanvas" width="1100" height="720"></canvas>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
